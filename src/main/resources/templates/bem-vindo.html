<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteBank — Bem-vindo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --accent: #e8553d;
          --dark: #0f1117;
          --card-bg: rgba(255, 255, 255, 0.04);
          --card-border: rgba(255, 255, 255, 0.08);
          --text-primary: #f0ece6;
          --text-muted: #b5b0bc;
          --input-bg: rgba(255, 255, 255, 0.06);
          --input-border: rgba(255, 255, 255, 0.1);
          --input-focus: rgba(232, 85, 61, 0.4);
        }

        * { box-sizing: border-box; }

        body {
          font-family: 'Nunito', sans-serif;
          background: var(--dark);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          color: var(--text-primary);
        }

        .bg-glow {
          position: fixed;
          inset: 0;
          z-index: 0;
          overflow: hidden;
        }
        .bg-glow::before,
        .bg-glow::after {
          content: '';
          position: absolute;
          border-radius: 50%;
          filter: blur(120px);
          opacity: .35;
          animation: float 12s ease-in-out infinite alternate;
        }
        .bg-glow::before {
          width: 500px; height: 500px;
          background: var(--accent);
          top: -15%; left: -10%;
        }
        .bg-glow::after {
          width: 400px; height: 400px;
          background: #6c3ce0;
          bottom: -10%; right: -5%;
          animation-delay: -6s;
        }
        @keyframes float {
          0%   { transform: translate(0, 0) scale(1); }
          100% { transform: translate(60px, 40px) scale(1.15); }
        }

        .bg-noise {
          position: fixed;
          inset: 0;
          z-index: 1;
          opacity: .045;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
          pointer-events: none;
        }

        .welcome-card {
          position: relative;
          z-index: 2;
          width: 100%;
          max-width: 440px;
          background: var(--card-bg);
          border: 1px solid var(--card-border);
          border-radius: 24px;
          padding: 3rem 2.5rem 2.5rem;
          backdrop-filter: blur(40px);
          -webkit-backdrop-filter: blur(40px);
          box-shadow:
            0 0 0 1px rgba(255,255,255,.03) inset,
            0 40px 80px -20px rgba(0,0,0,.5);
          text-align: center;
          animation: cardIn .8s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes cardIn {
          from { opacity: 0; transform: translateY(30px) scale(.97); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand-icon {
          width: 64px;
          height: 64px;
          background: linear-gradient(135deg, var(--accent), #f0875a);
          border-radius: 20px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin: 0 auto 2rem;
          box-shadow: 0 8px 24px -6px rgba(232, 85, 61, .45);
          animation: iconPop .6s .3s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes iconPop {
          from { opacity: 0; transform: scale(.6) rotate(-10deg); }
          to   { opacity: 1; transform: scale(1) rotate(0); }
        }

        .welcome-card h1 {
          font-family: 'Quicksand', sans-serif;
          font-weight: 700;
          font-size: 2rem;
          margin-bottom: .5rem;
          letter-spacing: -.02em;
          animation: fadeUp .6s .45s cubic-bezier(.16,1,.3,1) both;
        }
        .welcome-card .subtitle {
          color: var(--text-muted);
          font-size: .95rem;
          margin-bottom: 0;
          animation: fadeUp .6s .52s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(16px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
          .welcome-card { padding: 2rem 1.5rem 1.75rem; margin: 1rem; border-radius: 20px; }
          .welcome-card h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-noise"></div>

<div class="welcome-card">
    <div class="brand-icon">
        <svg width="32" height="32" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M3 21h18"/><path d="M3 10h18"/><path d="M5 6l7-3 7 3"/>
            <path d="M4 10v11"/><path d="M20 10v11"/><path d="M8 14v4"/><path d="M12 14v4"/><path d="M16 14v4"/>
        </svg>
    </div>
    <h1>Bem-vindo ao ByteBank</h1>
    <p class="subtitle">Sua conta foi criada com sucesso.</p>
</div>

</body>
</html>
