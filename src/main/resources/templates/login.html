<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteBank — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --accent: #e8553d;
          --accent-hover: #d4432c;
          --dark: #0f1117;
          --card-bg: rgba(255, 255, 255, 0.04);
          --card-border: rgba(255, 255, 255, 0.08);
          --text-primary: #f0ece6;
          --text-muted: #b5b0bc;
          --input-bg: rgba(255, 255, 255, 0.06);
          --input-border: rgba(255, 255, 255, 0.1);
          --input-focus: rgba(232, 85, 61, 0.4);
        }

        * { box-sizing: border-box; }

        body {
          font-family: 'Nunito', sans-serif;
          background: var(--dark);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          color: var(--text-primary);
        }

        /* Animated background */
        .bg-glow {
          position: fixed;
          inset: 0;
          z-index: 0;
          overflow: hidden;
        }
        .bg-glow::before,
        .bg-glow::after {
          content: '';
          position: absolute;
          border-radius: 50%;
          filter: blur(120px);
          opacity: .35;
          animation: float 12s ease-in-out infinite alternate;
        }
        .bg-glow::before {
          width: 500px; height: 500px;
          background: var(--accent);
          top: -15%; left: -10%;
        }
        .bg-glow::after {
          width: 400px; height: 400px;
          background: #6c3ce0;
          bottom: -10%; right: -5%;
          animation-delay: -6s;
        }
        @keyframes float {
          0%   { transform: translate(0, 0) scale(1); }
          100% { transform: translate(60px, 40px) scale(1.15); }
        }

        /* Noise overlay */
        .bg-noise {
          position: fixed;
          inset: 0;
          z-index: 1;
          opacity: .045;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
          pointer-events: none;
        }

        /* Card */
        .login-card {
          position: relative;
          z-index: 2;
          width: 100%;
          max-width: 440px;
          background: var(--card-bg);
          border: 1px solid var(--card-border);
          border-radius: 24px;
          padding: 3rem 2.5rem 2.5rem;
          backdrop-filter: blur(40px);
          -webkit-backdrop-filter: blur(40px);
          box-shadow:
            0 0 0 1px rgba(255,255,255,.03) inset,
            0 40px 80px -20px rgba(0,0,0,.5);
          animation: cardIn .8s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes cardIn {
          from { opacity: 0; transform: translateY(30px) scale(.97); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo / Brand */
        .brand-icon {
          width: 52px;
          height: 52px;
          background: linear-gradient(135deg, var(--accent), #f0875a);
          border-radius: 16px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 1.5rem;
          color: #fff;
          margin-bottom: 1.75rem;
          box-shadow: 0 8px 24px -6px rgba(232, 85, 61, .4);
          animation: iconPop .6s .3s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes iconPop {
          from { opacity: 0; transform: scale(.6) rotate(-10deg); }
          to   { opacity: 1; transform: scale(1) rotate(0); }
        }

        .login-card h1 {
          font-family: 'Quicksand', sans-serif;
          font-weight: 700;
          font-size: 1.85rem;
          margin-bottom: .35rem;
          letter-spacing: -.02em;
        }
        .login-card .subtitle {
          color: var(--text-muted);
          font-size: .925rem;
          margin-bottom: 2rem;
        }

        /* Form elements */
        .form-label {
          font-size: .8rem;
          font-weight: 500;
          letter-spacing: .06em;
          text-transform: uppercase;
          color: var(--text-muted);
          margin-bottom: .45rem;
        }

        .input-wrap {
          position: relative;
          margin-bottom: 1.25rem;
        }
        .form-control {
          background: var(--input-bg);
          border: 1px solid var(--input-border);
          border-radius: 14px;
          color: var(--text-primary);
          padding: .85rem 3rem .85rem 1.15rem;
          font-size: .95rem;
          transition: all .25s ease;
        }
        .form-control::placeholder {
          color: var(--text-muted);
          opacity: .75;
        }
        .form-control:focus {
          background: rgba(255,255,255,.08);
          border-color: var(--accent);
          box-shadow: 0 0 0 4px var(--input-focus);
          color: #fff;
        }

        .toggle-pw {
          position: absolute;
          right: 1rem;
          top: 50%;
          transform: translateY(-50%);
          background: none;
          border: none;
          color: var(--text-muted);
          cursor: pointer;
          font-size: 1.1rem;
          padding: 0;
          transition: color .2s;
        }
        .toggle-pw:hover { color: var(--text-primary); }

        /* Checkbox */
        .form-check-input {
          background-color: var(--input-bg);
          border-color: var(--input-border);
          border-radius: 5px;
          width: 1.15em;
          height: 1.15em;
        }
        .form-check-input:checked {
          background-color: var(--accent);
          border-color: var(--accent);
        }
        .form-check-input:focus {
          box-shadow: 0 0 0 3px var(--input-focus);
        }
        .form-check-label {
          font-size: .875rem;
          color: var(--text-muted);
        }
        .forgot-link {
          font-size: .875rem;
          color: var(--accent);
          text-decoration: none;
          font-weight: 500;
          transition: color .2s;
        }
        .forgot-link:hover { color: #f0875a; }

        /* Button */
        .btn-login {
          width: 100%;
          padding: .9rem;
          border: none;
          border-radius: 14px;
          font-size: 1rem;
          font-weight: 600;
          letter-spacing: .02em;
          color: #fff;
          background: linear-gradient(135deg, var(--accent), #d94e38);
          position: relative;
          overflow: hidden;
          transition: transform .2s, box-shadow .3s;
          cursor: pointer;
          margin-top: .5rem;
        }
        .btn-login::before {
          content: '';
          position: absolute;
          inset: 0;
          background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
          opacity: 0;
          transition: opacity .3s;
        }
        .btn-login:hover {
          transform: translateY(-2px);
          box-shadow: 0 12px 32px -8px rgba(232, 85, 61, .5);
        }
        .btn-login:hover::before { opacity: 1; }
        .btn-login:active { transform: translateY(0); }

        /* Divider */
        .divider {
          display: flex;
          align-items: center;
          gap: 1rem;
          margin: 1.5rem 0;
          color: var(--text-muted);
          font-size: .8rem;
          text-transform: uppercase;
          letter-spacing: .08em;
        }
        .divider::before,
        .divider::after {
          content: '';
          flex: 1;
          height: 1px;
          background: var(--input-border);
        }

        /* Social buttons */
        .btn-social {
          flex: 1;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: .55rem;
          padding: .75rem;
          border-radius: 14px;
          border: 1px solid var(--input-border);
          background: var(--input-bg);
          color: var(--text-primary);
          font-size: .9rem;
          font-weight: 500;
          cursor: pointer;
          transition: all .25s;
        }
        .btn-social:hover {
          background: rgba(255,255,255,.1);
          border-color: rgba(255,255,255,.18);
          transform: translateY(-1px);
        }
        .btn-social svg { flex-shrink: 0; }

        /* Footer */
        .card-footer-text {
          text-align: center;
          margin-top: 1.75rem;
          font-size: .9rem;
          color: var(--text-muted);
        }
        .card-footer-text a {
          color: var(--accent);
          text-decoration: none;
          font-weight: 600;
          transition: color .2s;
        }
        .card-footer-text a:hover { color: #f0875a; }

        /* Staggered entrance */
        .stagger { animation: fadeUp .6s cubic-bezier(.16,1,.3,1) both; }
        .stagger:nth-child(1) { animation-delay: .35s; }
        .stagger:nth-child(2) { animation-delay: .42s; }
        .stagger:nth-child(3) { animation-delay: .49s; }
        .stagger:nth-child(4) { animation-delay: .56s; }
        .stagger:nth-child(5) { animation-delay: .63s; }
        .stagger:nth-child(6) { animation-delay: .70s; }
        .stagger:nth-child(7) { animation-delay: .77s; }
        .stagger:nth-child(8) { animation-delay: .84s; }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(16px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
          .login-card { padding: 2rem 1.5rem 1.75rem; margin: 1rem; border-radius: 20px; }
          .login-card h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-noise"></div>

<div class="login-card">
    <div class="brand-icon stagger"><svg width="26" height="26" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M3 10h18"/><path d="M5 6l7-3 7 3"/><path d="M4 10v11"/><path d="M20 10v11"/><path d="M8 14v4"/><path d="M12 14v4"/><path d="M16 14v4"/></svg></div>
    <h1 class="stagger">ByteBank</h1>
    <p class="subtitle stagger">Entre com suas credenciais para acessar sua conta</p>

    <form autocomplete="off" method="post" th:action="@{/login}">
        <!-- Email -->
        <div class="stagger">
            <label class="form-label" for="email">E-mail</label>
            <div class="input-wrap">
                <input type="email" class="form-control" id="email" name="username" placeholder="seu@email.com">
            </div>
        </div>

        <!-- Password -->
        <div class="stagger">
            <label class="form-label" for="password">Senha</label>
            <div class="input-wrap">
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••">
                <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Mostrar senha">
                    <svg id="eyeOpen" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg id="eyeClosed" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
            </div>
        </div>

        <!-- Remember / Forgot -->
        <div class="d-flex justify-content-between align-items-center mb-3 stagger">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">Lembrar-me</label>
            </div>
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
        </div>

        <!-- Submit -->
        <div class="stagger">
            <button type="submit" class="btn-login" onclick="event.preventDefault()">
                Entrar
            </button>
        </div>

        <!-- Divider -->
        <div class="divider stagger">ou continue com</div>

        <!-- Social -->
        <div class="d-flex gap-3 stagger">
            <button type="button" class="btn-social">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 33.4 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 5.9 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.5 18.8 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 5.9 29.3 4 24 4 16 4 9.2 8.5 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.8 13.4-5l-6.2-5.2C29.3 35.2 26.7 36 24 36c-5.1 0-9.5-2.6-11.3-8l-6.5 5C9.1 39.4 16 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C37 39.2 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
                Google
            </button>
            <button type="button" class="btn-social">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub
            </button>
        </div>
    </form>

    <!-- Footer -->
    <p class="card-footer-text stagger">
        Não tem conta? <a th:href="@{/cadastro}" href="/cadastro">Criar agora</a>
    </p>
</div>

<script>
    function togglePassword() {
      const pw = document.getElementById('password');
      const open = document.getElementById('eyeOpen');
      const closed = document.getElementById('eyeClosed');
      if (pw.type === 'password') {
        pw.type = 'text';
        open.style.display = 'none';
        closed.style.display = 'block';
      } else {
        pw.type = 'password';
        open.style.display = 'block';
        closed.style.display = 'none';
      }
    }
</script>
</body>
</html>
